name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run swift test
        run: swift test

  bundle-size:
    name: Check Bundle Size
    runs-on: ubuntu-22.04
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            Examples/TodoApp/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build framework
        run: swift build

      - name: Install Swift WASM SDK
        run: |
          set -euo pipefail

          if swift sdk list 2>/dev/null | grep -Eq 'swift-[0-9.]+-RELEASE_wasm$'; then
            echo "WASM SDK already installed."
            swift sdk list
            exit 0
          fi

          SWIFT_VERSION="$(swift --version | sed -n 's/^.*Swift version \\([0-9.]*\\).*$/\\1/p' | head -n 1)"
          if [ -z "${SWIFT_VERSION:-}" ]; then
            echo "Could not determine Swift version; skipping WASM build."
            exit 0
          fi

          SDK_BASENAME="swift-${SWIFT_VERSION}-RELEASE"
          SDK_URL="https://download.swift.org/swift-${SWIFT_VERSION}-release/wasm-sdk/${SDK_BASENAME}/${SDK_BASENAME}_wasm.artifactbundle.tar.gz"

          if curl -fsI "$SDK_URL" >/dev/null; then
            echo "Installing WASM SDK: $SDK_URL"
            swift sdk install "$SDK_URL" || echo "WASM SDK install failed, skipping WASM build"
          else
            echo "No official WASM SDK found for Swift ${SWIFT_VERSION} at:"
            echo "$SDK_URL"
            echo "Skipping WASM build."
          fi

          swift sdk list || true

      - name: Build TodoApp for WASM
        working-directory: Examples/TodoApp
        run: |
          SDK_NAME=$(swift sdk list 2>/dev/null | grep -E 'swift-[0-9.]+-RELEASE_wasm$' | head -1 | xargs || echo "")
          if [ -n "$SDK_NAME" ]; then
            echo "Building with SDK: $SDK_NAME"
            swift build --swift-sdk "$SDK_NAME"
            SIZE=$(stat -c%s .build/debug/TodoApp.wasm)
            SIZE_KB=$(awk "BEGIN {printf \"%.1f\", $SIZE/1024}")
            echo "WASM build succeeded: ${SIZE_KB}KB"
          else
            echo "No WASM SDK available, skipping WASM build"
          fi

      - name: Create status check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Bundle Size',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Build succeeded',
                summary: 'Framework build completed successfully'
              }
            });
